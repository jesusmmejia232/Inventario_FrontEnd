<section class="auth-page-wrapper">
  <div class="login-bg" aria-hidden="true"></div>
  <div class="login-overlay" aria-hidden="true"></div>

  <div class="login-card">
    <div class="login-brand">
      <span class="login-brand__inve">Inve</span><span class="login-brand__ntario">ntario</span>
    </div>

    <nav class="login-tabs" aria-label="Tipo de acceso">
      <span class="login-tab login-tab--active" aria-current="page">Iniciar sesión</span>
      <span class="login-tab login-tab--inactive" title="Próximamente">Registro</span>
    </nav>

    @if (error) {
      <div class="login-alert" role="alert">
        <i class="ri-error-warning-line"></i>
        <span>{{ error }}</span>
        <button type="button" class="login-alert__close" (click)="error = ''" aria-label="Cerrar">×</button>
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      <div class="login-field">
        <label for="username" class="login-field__label">Usuario <span class="login-field__req">*</span></label>
        <div
          class="login-field__line"
          [class.login-field__line--invalid]="submitted && f['username'].errors"
        >
          <input
            type="text"
            id="username"
            class="login-field__input"
            formControlName="username"
            placeholder=""
            autocomplete="username"
          />
        </div>
        @if (submitted && f['username'].errors?.['required']) {
          <p class="login-field__error">El usuario es requerido</p>
        }
      </div>

      <div class="login-field">
        <label for="password-input" class="login-field__label">Contraseña <span class="login-field__req">*</span></label>
        <div
          class="login-field__line login-field__line--with-action"
          [class.login-field__line--invalid]="submitted && f['password'].errors"
        >
          <input
            [type]="fieldTextType ? 'text' : 'password'"
            id="password-input"
            class="login-field__input"
            formControlName="password"
            placeholder=""
            autocomplete="current-password"
          />
          <button type="button" class="login-field__eye" (click)="toggleFieldTextType()" aria-label="Mostrar u ocultar contraseña">
            @if (!fieldTextType) {
              <i class="ri-eye-line"></i>
            } @else {
              <i class="ri-eye-off-line"></i>
            }
          </button>
        </div>
        @if (submitted && f['password'].errors?.['required']) {
          <p class="login-field__error">La contraseña es requerida</p>
        }
      </div>

      <div class="login-remember">
        <input class="login-remember__input" type="checkbox" id="auth-remember-check" />
        <label class="login-remember__label" for="auth-remember-check">Mantener sesión iniciada</label>
      </div>

      <button class="login-submit" type="submit">
        Iniciar sesión
      </button>

      <div class="login-forgot">
        <a routerLink="/auth/pass-reset">¿Olvidaste tu contraseña?</a>
      </div>
    </form>
  </div>
</section>
