<div class="salidas-page">
  <app-breadcrumbs title="Detalle de salida" [breadcrumbItems]="breadCrumbItems"></app-breadcrumbs>

  <div class="row">
    <div class="col-lg-12">
      <button type="button" class="btn btn-link ps-0 mb-3" (click)="volver()">
        <i class="ri-arrow-left-line align-bottom me-1"></i> Volver al listado
      </button>

      <div *ngIf="saliId <= 0" class="alert alert-warning">
        Identificador de salida no válido.
      </div>

      <app-details
        *ngIf="saliId > 0"
        [saliId]="saliId"
        (onCancel)="volver()"
        (onRecibir)="volver()">
      </app-details>
    </div>
  </div>
</div>
